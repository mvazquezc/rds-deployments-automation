---
become_override: true
ocp_username: opentlc-mgr
silent: false
lab_version: "lab-4.20"
lab_release: "4.20"
repo_user: "RHsyseng"
platform_demo_redhat_com: true
student_name: "lab-user"
# yamllint disable rule:line-length
kcli_rpm: "https://github.com/{{ repo_user }}/5g-core-deployments-on-ocp-lab/releases/download/{{ lab_release }}/kcli-99.0.0.git.202602040650.86cacd3-0.el9.x86_64.rpm"
lab_repo: "https://github.com/{{ repo_user }}/5g-core-deployments-on-ocp-lab.git"
# yamllint enable rule:line-length
ocp4_major_release: "4.20"
ocp4_minor_release: "4.20.10"
lab_network_cidr: "192.168.125.0/24"
lab_network_ipv6_cidr: "2620:52:0:1305::/64"
lab_network_domain: "5g-deployment.lab"
lab_sriov_domain: "sriov-network.lab"
lab_ptp_domain: "ptp-network.lab"
lab_sriov_cidr: "192.168.100.0/24"
lab_ptp_cidr: "192.168.200.0/24"
lab_registry_host: "infra.5g-deployment.lab:8443"
lab_registry_user: "admin"
lab_registry_password: "r3dh4t1!"
lab_api_host: "api.hub.5g-deployment.lab:6443"
upstream_dns: "1.1.1.1"
run_oc_mirror: true #run imageset-config-core.yaml to populate local registry with OCP 4.18/4.19/4.20 releases and operators
oc_mirror_timeout: 7200  # seconds (2h); increase for slow connections
imageset_config_files:
  - imageset-mirror-core-418.yaml
  - imageset-mirror-core-419.yaml
  - imageset-mirror-core-420.yaml
disconnected_update: false #when disconnected_update is true, kcli will mirror the hub release and operators  version
lab_remove_registry: false  #Deleting the registry wipes all mirrored images; re-mirroring is very costly
download_rhcos_isos: false
install_lab_dependencies: false
hypervisor_min_memory_mb: 204800
hypervisor_min_cpus: 64
hypervisor_supported_distributions: ['RedHat', 'CentOS', 'Fedora']
# Hub: same as RAN (CPU, memory, storage)
lab_hub_vm_cpus: 16
lab_hub_vm_memory: 48000
lab_hub_vm_disk: 200
# MNO: 3 masters + 9 workers (3 per failure domain), 12 CPUs each
lab_mno_master_count: 3
lab_mno_worker_count: 9
lab_mno_failure_domains: 3
lab_mno_master_vm_cpus: 12
lab_mno_master_vm_memory: 16384
lab_mno_master_vm_disk: 120
lab_mno_worker_vm_cpus: 12
lab_mno_worker_vm_memory: 16384
lab_mno_worker_vm_disk: 120
lab_mno_worker_vm_extra_disk: 120  # extra disk for ODF per worker
lab_deploy_minio: true  # 5G Core lab: ODF provides S3, MinIO not used
extra_disk_libvirt_images: true
disconnected_catalog_image: infra.5g-deployment.lab:8443/redhat/redhat-operator-index:v4.20-1769431701
# yamllint disable rule:line-length
rhcos_live_images:
  - https://mirror.openshift.com/pub/openshift-v4/x86_64/dependencies/rhcos/4.18/4.18.30/rhcos-4.18.30-x86_64-live.x86_64.iso
  - https://mirror.openshift.com/pub/openshift-v4/x86_64/dependencies/rhcos/4.19/4.19.23/rhcos-4.19.23-x86_64-live-iso.x86_64.iso
  - https://mirror.openshift.com/pub/openshift-v4/x86_64/dependencies/rhcos/4.20/4.20.0/rhcos-4.20.0-x86_64-live-iso.x86_64.iso
rhcos_rootfs_images:
  - https://mirror.openshift.com/pub/openshift-v4/x86_64/dependencies/rhcos/4.18/4.18.30/rhcos-4.18.30-x86_64-live-rootfs.x86_64.img
  - https://mirror.openshift.com/pub/openshift-v4/x86_64/dependencies/rhcos/4.19/4.19.23/rhcos-4.19.23-x86_64-live-rootfs.x86_64.img
  - https://mirror.openshift.com/pub/openshift-v4/x86_64/dependencies/rhcos/4.20/4.20.0/rhcos-4.20.0-x86_64-live-rootfs.x86_64.img
lab_url: "https://labs.sysdeseng.com/5g-core-deployments-on-ocp-lab/{{ ocp4_major_release }}/index.html"
# yamllint enable rule:line-length
