---
# Implement your Workload removal tasks here

- name: Setting up workload for user
  debug:
    msg: "Setting up workload for user ocp_username = {{ ocp_username }}"

- name: Ensure lab VMs are deleted
  ansible.builtin.shell:
    cmd: "kcli delete plan hub --yes"
  register: result
  failed_when: result.rc != 0 and "not found" not in result.stderr
  ignore_errors: true
  
- name: Ensure all lab services are stopped and disabled
  ansible.builtin.systemd:
    state: stopped
    enabled: false
    name: "{{ item }}"
  with_items:
    - podman-gitea
    - podman-registry
    - podman-webcache
    - podman-showroom-firefox
    - podman-minio
    - podman-showroom-traefik
    - podman-showroom-apache
    - podman-showroom-wetty
    - dnsmasq-virt
    - ksushy
  ignore_errors: true

- name: Ensure HAProxy service is stopped
  ansible.builtin.systemd:
    state: stopped
    daemon_reload: true
    enabled: false
    name: "haproxy"
  ignore_errors: true

- name: Ensure lab podman images are removed
  containers.podman.podman_image:
    name: "{{ item }}"
    state: absent
    force: true
  with_items:
    - quay.io/alosadag/httpd:p8080
    - quay.io/mavazque/gitea:1.17.3
    - quay.io/mavazque/registry:2.7.1
    - quay.io/fedora/httpd-24-micro:2.4
    - quay.io/rhsysdeseng/showroom:webfirefox
    - quay.io/rhsysdeseng/showroom:traefik-v3.3.4
    - quay.io/minio/minio:RELEASE.2025-02-07T23-21-09Z
    - quay.io/rhsysdeseng/showroom:wetty
    - quay.io/rhsysdeseng/showroom:antora-v3.0.0
    - infra.5g-deployment.lab:8443/openshift4/ztp-site-generate-rhel8:v4.20.0-1
    - registry.redhat.io/openshift4/ztp-site-generate-rhel8:v4.19
  ignore_errors: true

- name: Ensure disconnected registry directory is deleted
  ansible.builtin.file:
    path: /opt/registry
    state: absent
  when: lab_remove_registry | default(false) | bool

- name: Ensure lab directories are deleted
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  with_items:
    - /opt/gitea
    - /opt/webcache
    - /opt/dnsmasq
    - /opt/minio
    - /opt/showroom
    - /root/.kcli
    - /root/manifests
    - /root/working-dir

- name: Ensure lab binaries are removed
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  with_items:
    - /usr/bin/oc
    - /usr/bin/kubectl
    - /usr/bin/openshift-install

- name: Ensure known lab files in /root are removed
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  with_items:
    - /root/hub.yml
    - /root/openshift_pull.json
    - /root/.docker/config.json
    - /root/mirroring-418.log
    - /root/mirroring-419.log
    - /root/mirroring-420.log
    - /root/kcli-hub-deploy.log
    - /root/imageset-mirror-core-418.yaml
    - /root/imageset-mirror-core-419.yaml
    - /root/imageset-mirror-core-420.yaml

- name: Ensure oc-mirror workspace directories are removed
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  with_items:
    - /root/workspace-418
    - /root/workspace-419
    - /root/workspace-420

- name: Ensure non-hidden regular files in /root are removed
  ansible.builtin.shell:
    cmd: "find /root -maxdepth 1 -not -name '.*' -not -type d -delete"
  changed_when: false
  failed_when: false

- name: Ensure temp yaml and json files are removed
  ansible.builtin.shell:
    cmd: "rm -f /tmp/*.yaml /tmp/*.json"
  changed_when: false
  failed_when: false

- name: Ensure lab-user ssh directory is removed
  ansible.builtin.file:
    path: "/home/{{ student_name }}/.ssh"
    state: absent

- name: Ensure lab-user files are removed
  ansible.builtin.shell:
    cmd: "find /home/{{ student_name }} -maxdepth 1 -not -name '.*' -not -type d -delete"
  changed_when: false
  failed_when: false

- name: Ensure lab service unit files are deleted
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  with_items:
    - /etc/systemd/system/podman-registry.service
    - /etc/systemd/system/podman-gitea.service
    - /etc/systemd/system/podman-webcache.service
    - /etc/systemd/system/podman-minio.service
    - /etc/systemd/system/podman-showroom-apache.service
    - /etc/systemd/system/podman-showroom-wetty.service
    - /etc/systemd/system/podman-showroom-firefox.service
    - /etc/systemd/system/podman-showroom-traefik.service
    - /etc/systemd/system/dnsmasq-virt.service
    - /usr/lib/systemd/system/ksushy.service
    - /etc/NetworkManager/dispatcher.d/forcedns

- name: Reload systemd daemon after removing unit files
  ansible.builtin.systemd:
    daemon_reload: true

# Leave this as the last task in the playbook.
- name: remove_workload tasks complete
  debug:
    msg: "Remove Workload tasks completed successfully."
  when: not silent|bool
