- name: Ensure manifests folder exists
  ansible.builtin.file:
    path: /root/manifests
    state: directory
    mode: '0755'

- name: Ensure NTP extra manifest exists
  ansible.builtin.blockinfile:
    path: /root/manifests/ntp.yaml
    create: true
    block: |
      apiVersion: machineconfiguration.openshift.io/v1
      kind: MachineConfig
      metadata:
        labels:
          machineconfiguration.openshift.io/role: master
        name: 99-master-chrony-configuration
      spec:
        config:
          ignition:
            config: {}
            security:
              tls: {}
            timeouts: {}
            version: 3.1.0
          networkd: {}
          passwd: {}
          storage:
            files:
            - contents:
                source: data:text/plain;charset=utf-8;base64,c2VydmVyIDAubm9ydGgtYW1lcmljYS5wb29sLm50cC5vcmcgaWJ1cnN0CmRyaWZ0ZmlsZSAvdmFyL2xpYi9jaHJvbnkvZHJpZnQKbWFrZXN0ZXAgMS4wIDMKcnRjc3luYwpsb2dkaXIgL3Zhci9sb2cvY2hyb255Cg==
              mode: 420
              overwrite: true
              path: /etc/chrony.conf
        osImageURL: ""

- name: Configure CatalogSource extra manifest for golden image env
  ansible.builtin.copy:
    dest: /root/manifests/disconnected-catalog-source.yaml
    content: |
      apiVersion: operators.coreos.com/v1alpha1
      kind: CatalogSource
      metadata:
        name: cs-redhat-operator-index-v4-20-176943
        namespace: openshift-marketplace
        annotations:
          target.workload.openshift.io/management: '{"effect": "PreferredDuringScheduling"}'
      spec:
        displayName: Red Hat Operators
        image: "{{ disconnected_catalog_image }}"
        publisher: Red Hat
        sourceType: grpc
        updateStrategy:
          registryPoll:
            interval: 1h
    owner: root
    group: root
    mode: '0644'
  when: not disconnected_update|bool

- name: Deploy hub cluster via kcli
  ansible.builtin.shell:
    cmd: kcli create cluster openshift --pf hub.yml -P force=true &> /root/kcli-hub-deploy.log
  args:
    chdir: /root/
  when: again is undefined

- name: Ensure kubernetes manifests are downloaded #execute while waiting for the hub to be deployed
  ansible.builtin.get_url:
    url: "{{ item.url }}"
    dest: "{{ item.destination }}"
    mode: "{{ item.mode }}"
    force: true
  # yamllint disable rule:line-length
  loop:
    - {url: "https://raw.githubusercontent.com/{{ repo_user }}/5g-core-deployments-on-ocp-lab/{{ lab_version }}/lab-materials/lab-env-data/hub-cluster/argocd-patch.json", destination: "/tmp/argocd-openshift-gitops-patch.json", mode: "0644"}
    - {url: "https://raw.githubusercontent.com/{{ repo_user }}/5g-core-deployments-on-ocp-lab/{{ lab_version }}/lab-materials/lab-env-data/hub-cluster/hub-operators-argoapps.yaml", destination: "/tmp/hub-operators-argoapps.yaml", mode: "0644"}
    - {url: "https://raw.githubusercontent.com/{{ repo_user }}/5g-core-deployments-on-ocp-lab/{{ lab_version }}/lab-materials/lab-env-data/hub-cluster/argocd-clusterrolebinding.yaml", destination: "/tmp/argocd-clusterrolebinding.yaml", mode: "0644"}
  # yamllint enable rule:line-length
  delay: 10
  retries: 5

- name: Ensure we can login into the hub cluster with the generated credentials
  ansible.builtin.shell:
    cmd: |
      oc login https://{{ lab_api_host }} \
        -u admin \
        -p {{ strong_admin_password }} \
        --insecure-skip-tls-verify=true \
        > /dev/null
  register: hub_login_result
  until: hub_login_result.rc == 0
  retries: 120
  delay: 60
  when: again is undefined
  failed_when: hub_login_result.rc != 0
  changed_when: hub_login_result.rc == 0

- name: Ensure we have the kubeconfig file for the hub cluster copied in the bastion
  ansible.builtin.copy:
    src: /root/.kcli/clusters/hub/auth/kubeconfig
    dest: "/home/{{ student_name }}/hub-kubeconfig"
    remote_src: true
    owner: "{{ student_name }}"

- name: Remove kubeadmin user
  kubernetes.core.k8s:
    kubeconfig: "/home/{{ student_name }}/hub-kubeconfig"
    state: absent
    api_version: v1
    kind: Secret
    namespace: kube-system
    name: kubeadmin

- name: Label nodes with cluster.ocs.openshift.io/openshift-storage
  kubernetes.core.k8s:
    kubeconfig: "/home/{{ student_name }}/hub-kubeconfig"
    state: present
    definition:
      apiVersion: v1
      kind: Node
      metadata:
        name: "{{ item }}"
        labels:
          cluster.ocs.openshift.io/openshift-storage: ""
  loop:
    - hub-ctlplane-0.5g-deployment.lab
    - hub-ctlplane-1.5g-deployment.lab
    - hub-ctlplane-2.5g-deployment.lab

- name: Ensure ArgoCD instance is patched for ZTP support
  kubernetes.core.k8s:
    kubeconfig: "/home/{{ student_name }}/hub-kubeconfig"
    api_version: argoproj.io/v1alpha1
    kind: ArgoCD
    name: openshift-gitops
    namespace: openshift-gitops
    state: patched
    src: /tmp/argocd-openshift-gitops-patch.json
    merge_type: merge
  register: argocd_patch_result
  until: argocd_patch_result.failed != true
  retries: 10
  delay: 10
  failed_when: argocd_patch_result.failed
  changed_when: not argocd_patch_result.failed

- name: Apply ArgoCD ClusterRoleBinding manifest to the cluster
  kubernetes.core.k8s:
    kubeconfig: "/home/{{ student_name }}/hub-kubeconfig"
    state: present
    src: /tmp/argocd-clusterrolebinding.yaml
  register: result
  until: result.failed != true
  retries: 10
  delay: 10

- name: Wait until ArgoCD Pods are ready
  kubernetes.core.k8s_info:
    kubeconfig: "/home/{{ student_name }}/hub-kubeconfig"
    kind: Pod
    namespace: openshift-gitops
    label_selectors:
      - app.kubernetes.io/name = openshift-gitops-repo-server
  register: result
  until:
    - result.resources | length > 0
    - result.resources[0].status is defined
    - result.resources[0].status.phase is defined
    - result.resources[0].status.phase == "Running"
    - result.resources[0].status.containerStatuses is defined
    - result.resources[0].status.containerStatuses | length > 0
    - result.resources[0].status.containerStatuses[0].ready == true
  retries: 10
  delay: 10

- name: Apply HUB Cluster Operators APPs
  kubernetes.core.k8s:
    kubeconfig: "/home/{{ student_name }}/hub-kubeconfig"
    state: present
    src: /tmp/hub-operators-argoapps.yaml
  register: result
  until: result.failed != true
  retries: 10
  delay: 10

- name: Wait until StorageCluster is ready
  kubernetes.core.k8s_info:
    kubeconfig: "/home/{{ student_name }}/hub-kubeconfig"
    api_version: ocs.openshift.io/v1
    kind: StorageCluster
    name: ocs-storagecluster
    namespace: openshift-storage
  register: storagecluster
  retries: 60
  delay: 60
  until:
    - storagecluster is defined
    - storagecluster.resources | length > 0
    - storagecluster.resources[0].status is defined
    - storagecluster.resources[0].status.phase is defined
    - storagecluster.resources[0].status.phase == "Ready"

- name: Ensure Ceph RBD storageclass is set as default
  kubernetes.core.k8s:
    kubeconfig: "/home/{{ student_name }}/hub-kubeconfig"
    state: patched
    api_version: storage.k8s.io/v1
    kind: StorageClass
    name: ocs-storagecluster-ceph-rbd
    definition:
      metadata:
        annotations:
          storageclass.kubernetes.io/is-default-class: "true"
  register: result
  until: result.failed != true
  retries: 10
  delay: 30

- name: Wait until ArgoCD APP for HUB Cluster Operators deployment is ready
  kubernetes.core.k8s_info:
    kubeconfig: "/home/{{ student_name }}/hub-kubeconfig"
    api_version: argoproj.io/v1alpha1
    kind: Application
    name: hub-operators-deployment
    namespace: openshift-gitops
  register: argocd_app_hub_operators
  retries: 100
  delay: 10
  until:
    - argocd_app_hub_operators is defined
    - argocd_app_hub_operators.resources | length > 0
    - argocd_app_hub_operators.resources[0].status is defined
    - argocd_app_hub_operators.resources[0].status.health is defined
    - argocd_app_hub_operators.resources[0].status.health.status is defined
    - argocd_app_hub_operators.resources[0].status.health.status == "Healthy"
    - argocd_app_hub_operators.resources[0].status.sync is defined
    - argocd_app_hub_operators.resources[0].status.sync.status is defined
    - argocd_app_hub_operators.resources[0].status.sync.status == "Synced"

- name: Wait until ArgoCD APP for HUB Cluster Operators config is ready
  kubernetes.core.k8s_info:
    kubeconfig: "/home/{{ student_name }}/hub-kubeconfig"
    api_version: argoproj.io/v1alpha1
    kind: Application
    name: hub-operators-config
    namespace: openshift-gitops
  register: argocd_app_hub_operators
  retries: 100
  delay: 10
  until:
    - argocd_app_hub_operators is defined
    - argocd_app_hub_operators.resources | length > 0
    - argocd_app_hub_operators.resources[0].status is defined
    - argocd_app_hub_operators.resources[0].status.health is defined
    - argocd_app_hub_operators.resources[0].status.health.status is defined
    - argocd_app_hub_operators.resources[0].status.health.status == "Healthy"
    - argocd_app_hub_operators.resources[0].status.sync is defined
    - argocd_app_hub_operators.resources[0].status.sync.status is defined
    - argocd_app_hub_operators.resources[0].status.sync.status == "Synced"

- name: Wait until MultiClusterHub is ready
  kubernetes.core.k8s_info:
    kubeconfig: "/home/{{ student_name }}/hub-kubeconfig"
    api_version: operator.open-cluster-management.io/v1
    kind: MultiClusterHub
    name: multiclusterhub
    namespace: open-cluster-management
  register: rhacm_multiclusterhub
  retries: 100
  delay: 10
  until:
    - rhacm_multiclusterhub is defined
    - rhacm_multiclusterhub.resources | length > 0
    - rhacm_multiclusterhub.resources[0].status is defined
    - rhacm_multiclusterhub.resources[0].status.phase is defined
    - rhacm_multiclusterhub.resources[0].status.phase == "Running"

- name: Wait until MultiClusterEngine is ready
  kubernetes.core.k8s_info:
    kubeconfig: "/home/{{ student_name }}/hub-kubeconfig"
    api_version: multicluster.openshift.io/v1
    kind: MultiClusterEngine
    name: multiclusterengine
    namespace: multicluster-engine
  register: mce_multiclusterengine
  retries: 60
  delay: 10
  until:
    - mce_multiclusterengine is defined
    - mce_multiclusterengine.resources | length > 0
    - mce_multiclusterengine.resources[0].status is defined
    - mce_multiclusterengine.resources[0].status.phase is defined
    - mce_multiclusterengine.resources[0].status.phase == "Available"

- name: Wait until MultiClusterObservability is ready
  kubernetes.core.k8s_info:
    kubeconfig: "/home/{{ student_name }}/hub-kubeconfig"
    api_version: observability.open-cluster-management.io/v1beta2
    kind: MultiClusterObservability
    name: observability
    namespace: open-cluster-management-observability
  register: mco_multiclusterobservability
  retries: 60
  delay: 10
  until:
    - mco_multiclusterobservability is defined
    - mco_multiclusterobservability.resources | length > 0
    - mco_multiclusterobservability.resources[0].status is defined
    - mco_multiclusterobservability.resources[0].status.conditions|json_query('[?type==`Ready`].status')

- name: Get rook-ceph-tools pod
  kubernetes.core.k8s_info:
    kubeconfig: "/home/{{ student_name }}/hub-kubeconfig"
    api_version: v1
    kind: Pod
    namespace: openshift-storage
    label_selectors:
      - app=rook-ceph-tools
  register: rook_ceph_tools_pod

- name: Download create-external-cluster-resources.py script into rook-ceph-tools pod
  kubernetes.core.k8s_exec:
    kubeconfig: "/home/{{ student_name }}/hub-kubeconfig"
    namespace: openshift-storage
    pod: "{{ rook_ceph_tools_pod.resources[0].metadata.name }}"
    command: >-
      curl -Ls
      https://raw.githubusercontent.com/rook/rook/refs/heads/release-1.19/deploy/examples/create-external-cluster-resources.py
      -o /tmp/create-external-cluster-resources.py
  retries: 5
  delay: 10

- name: Run create-external-cluster-resources.py script
  kubernetes.core.k8s_exec:
    kubeconfig: "/home/{{ student_name }}/hub-kubeconfig"
    namespace: openshift-storage
    pod: "{{ rook_ceph_tools_pod.resources[0].metadata.name }}"
    command: >-
      python3 /tmp/create-external-cluster-resources.py
      --rbd-data-pool-name ocs-storagecluster-cephblockpool
  register: external_cluster_resources_output

- name: Save external Ceph config to file
  ansible.builtin.copy:
    content: "{{ external_cluster_resources_output.stdout }}"
    dest: "/home/{{ student_name }}/external-ceph-config.json"
    mode: "0644"
    owner: "{{ student_name }}"

- name: Ensure MNO ssh key is downloaded
  ansible.builtin.get_url:
    # yamllint disable rule:line-length
    url: "http://infra.5g-deployment.lab:3000/student/5g-core-deployments-on-ocp-lab/raw/branch/{{ lab_version }}/lab-materials/lab-env-data/hypervisor/ssh-key"
    # yamllint enable rule:line-length
    dest: "/home/{{ student_name }}/.ssh/mnokey"
    mode: "0400"
    owner: "{{ student_name }}"
  retries: 3
  delay: 5

- name: Workload tasks complete (Hub and ArgoCD ready; user deploys MNO)
  debug:
    msg: "Workload Tasks completed successfully."
